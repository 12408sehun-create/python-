{% extends "base.html" %}

{% block title %}编辑成绩 - 大学生管理系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h4 class="mb-4"><i class="bi bi-pencil"></i> 编辑成绩</h4>
        
        <form method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">学生</label>
                    <input type="text" class="form-control" value="{{ grade.student_name }} ({{ grade.student_id }})" readonly>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">课程</label>
                    <input type="text" class="form-control" value="{{ grade.course_name }}" readonly>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="score" class="form-label">成绩 (0-100)</label>
                    <input type="number" class="form-control" id="score" name="score" value="{{ grade.score if grade.score else '' }}" min="0" max="100" step="0.1">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="exam_date" class="form-label">考试日期</label>
                    <input type="date" class="form-control" id="exam_date" name="exam_date" value="{{ grade.exam_date if grade.exam_date else '' }}">
                </div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存修改
                </button>
                <a href="{{ url_for('grades') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
