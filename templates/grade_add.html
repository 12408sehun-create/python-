{% extends "base.html" %}

{% block title %}grade-add-student-management{% endblock %}

{% block content %}

<style>
    /* 隐藏数字输入框的上下箭头 */
    .no-spinner::-webkit-inner-spin-button,
    .no-spinner::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    .no-spinner {
        -moz-appearance: textfield; /* 兼容 Firefox */
    }
</style>

<div class="card">
    <div class="card-body">
        <h4 class="mb-4"><i class="bi bi-graph-up"></i> 批量添加成绩</h4>
        
        <form method="post" id="gradeForm">
            <!-- 筛选条件 -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="major" class="form-label">专业</label>
                    <select class="form-select" id="major" name="major">
                        <option value="">全部专业</option>
                        <option value="中文系">中文系</option>
                        <option value="英文系">英文系</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="class_name" class="form-label">班级</label>
                    <select class="form-select" id="class_name" name="class_name">
                        <option value="">请选择班级</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="semester" class="form-label">学期 <span class="text-danger">*</span></label>
                    <select class="form-select" id="semester" name="semester" required>
                        <option value="">请选择学期</option>
                        <option value="2024-2025-1">2025-2026-1</option>
                        <option value="2024-2025-2">2025-2026-2</option>
                        <option value="2023-2024-1">2026-2027-1</option>
                        <option value="2023-2024-2">2026-2027-2</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="exam_date" class="form-label">考试日期</label>
                    <input type="date" class="form-control" id="exam_date" name="exam_date">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="course_name" class="form-label">课程名称</label>
                    <input type="text" class="form-control" id="course_name" name="course_name">
                </div>
            </div>
            
            <!-- 学生成绩列表 -->
            <div id="studentListSection" style="display: none;">
                <div class="alert alert-info mb-3">
                    <i class="bi bi-info-circle"></i> 已选择班级：<span id="selectedClassName"></span>，共 <span id="studentCount">0</span> 名学生
                </div>
                
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-light">
                            <tr>
                                <th>学号</th>
                                <th>姓名</th>
                                <th>出勤</th>
                                <th>活动</th>
                                <th>期末</th>
                                <th>总分</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="noStudentAlert" class="alert alert-warning">
                <i class="bi bi-exclamation-triangle"></i> 请先选择专业和班级，系统将显示该班级所有学生，方便批量录入成绩
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
                    <i class="bi bi-check-circle"></i> 保存
                </button>
                <a href="{{ url_for('grades') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>


<script>
// 班级数据（从后端获取）
var allClasses = [
    {% for cls in classes %}
    {id: '{{ cls.id }}', name: '{{ cls.class_name }}', major: '{{ cls.major }}'},
    {% endfor %}
];

// 学生数据（从后端获取）
var allStudents = [
    {% for student in all_students %}
    {student_id: '{{ student.student_id }}', name: '{{ student.name }}', class_name: '{{ student.class_name }}'},
    {% endfor %}
];

// 专业变化时更新班级下拉框
document.getElementById('major').addEventListener('change', function() {
    var major = this.value;
    var classSelect = document.getElementById('class_name');
    
    // 清空班级选项
    classSelect.innerHTML = '<option value="">请选择班级</option>';
    
    // 根据专业筛选班级
    var filteredClasses = allClasses;
    if (major) {
        filteredClasses = allClasses.filter(function(c) { return c.major === major; });
    }
    
    // 添加班级选项
    filteredClasses.forEach(function(cls) {
        var option = document.createElement('option');
        option.value = cls.name;
        option.textContent = cls.name;
        classSelect.appendChild(option);
    });
    
    // 重置学生列表
    resetStudentList();
});

// 班级变化时更新学生列表
document.getElementById('class_name').addEventListener('change', function() {
    var className = this.value;
    showStudents(className);
});

function showStudents(className) {
    var studentListSection = document.getElementById('studentListSection');
    var noStudentAlert = document.getElementById('noStudentAlert');
    var studentTableBody = document.getElementById('studentTableBody');
    var selectedClassName = document.getElementById('selectedClassName');
    var studentCount = document.getElementById('studentCount');
    var submitBtn = document.getElementById('submitBtn');
    
    if (!className) {
        studentListSection.style.display = 'none';
        noStudentAlert.style.display = 'block';
        submitBtn.disabled = true;
        return;
    }
    
    // 筛选该班级的学生
    var students = allStudents.filter(function(s) { return s.class_name === className; }).sort(function(a, b) { return parseInt(a.student_id) - parseInt(b.student_id); });


    
    if (students.length === 0) {
        studentListSection.style.display = 'none';
        noStudentAlert.style.display = 'block';
        noStudentAlert.innerHTML = '<i class="bi bi-exclamation-triangle"></i> 该班级暂无学生，请先添加学生';
        submitBtn.disabled = true;
        return;
    }
    
    // 显示学生列表
    selectedClassName.textContent = className;
    studentCount.textContent = students.length;
    studentTableBody.innerHTML = '';
    
    students.forEach(function(student) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + student.student_id + '</td>' +
                       '<td>' + student.name + '</td>' +
                       '<td><input type="number" class="form-control no-spinner attendance-score" name="attendance_score_' + student.student_id + '" min="0" step="0.1"></td>' +
                       '<td><input type="number" class="form-control no-spinner activity-score" name="activity_score_' + student.student_id + '" min="0" step="0.1"></td>' +
                       '<td><input type="number" class="form-control no-spinner final-score" name="final_score_' + student.student_id + '" min="0" step="0.1"></td>'+
                       '<td><input type="number" class="form-control no-spinner total-score" name="score_' + student.student_id + '" min="0" step="0.1"></td>';

        studentTableBody.appendChild(tr);
    });
    
    studentListSection.style.display = 'block';
    noStudentAlert.style.display = 'none';
    submitBtn.disabled = false;
}

function resetStudentList() {
    document.getElementById('studentListSection').style.display = 'none';
    document.getElementById('noStudentAlert').style.display = 'block';
    document.getElementById('noStudentAlert').innerHTML = '<i class="bi bi-exclamation-triangle"></i> 请先选择专业和班级，系统将显示该班级所有学生，方便批量录入成绩';
    document.getElementById('submitBtn').disabled = true;
}

// 页面加载时初始化班级列表
document.addEventListener('DOMContentLoaded', function() {
    var major = document.getElementById('major').value;
    var classSelect = document.getElementById('class_name');
    
    var filteredClasses = allClasses;
    if (major) {
        filteredClasses = allClasses.filter(function(c) { return c.major === major; });
    }
    
    classSelect.innerHTML = '<option value=""></option>';
    filteredClasses.forEach(function(cls) {
        var option = document.createElement('option');
        option.value = cls.name;
        option.textContent = cls.name;
        classSelect.appendChild(option);
    });
});

// 监听成绩输入，自动计算总分
document.getElementById('studentTableBody').addEventListener('input', function(e) {
    if (e.target.classList.contains('attendance-score') || 
        e.target.classList.contains('activity-score') || 
        e.target.classList.contains('final-score')) {
        
        var row = e.target.closest('tr');
        if (!row) return;
        
        var attInput = row.querySelector('.attendance-score');
        var actInput = row.querySelector('.activity-score');
        var finInput = row.querySelector('.final-score');
        var totalInput = row.querySelector('.total-score');
        
        if (!attInput || !actInput || !finInput || !totalInput) return;
        
        var att = attInput.value.trim();
        var act = actInput.value.trim();
        var fin = finInput.value.trim();
        
        // 只要三个分数框都有值就自动计算总数
        if (att !== '' && act !== '' && fin !== '') {
            var sum = parseFloat(att) + parseFloat(act) + parseFloat(fin);
            totalInput.value = isNaN(sum) ? '' : sum;
        }
    }
});

// 页面加载时初始化班级列表


</script>
{% endblock %}
