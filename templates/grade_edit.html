{% extends "base.html" %}

{% block title %}编辑成绩 - 大学生管理系统{% endblock %}

{% block content %}

<style>
    /* 隐藏数字输入框的上下箭头 */
    .no-spinner::-webkit-inner-spin-button,
    .no-spinner::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    .no-spinner {
        -moz-appearance: textfield; /* 兼容 Firefox */
    }
</style>

<div class="card">
    <div class="card-body">
        <h4 class="mb-4"><i class="bi bi-pencil"></i> 编辑成绩</h4>
        
        <form method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">学生</label>
                    <input type="text" class="form-control" value="{{ grade.student_name }} ({{ grade.student_id }})" readonly>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">课程</label>
                    <input type="text" class="form-control" value="{{ grade.course_name }}" readonly>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="attendance_score" class="form-label">出勤</label>
                    <input type="number" class="form-control no-spinner" id="attendance_score" name="attendance_score" value="{{ grade.attendance_score if grade.attendance_score is not none else '' }}" min="0" max="100" step="0.1">
            </div>
                <div class="col-md-4 mb-3">
                    <label for="activity_score" class="form-label">活动</label>
                    <input type="number" class="form-control no-spinner" id="activity_score" name="activity_score" 
               value="{{ grade.activity_score if grade.activity_score is not none else '' }}" min="0" max="100" step="0.1">
            </div>
                <div class="col-md-4 mb-3">
                    <label for="final_score" class="form-label">期末</label>
                    <input type="number" class="form-control no-spinner" id="final_score" name="final_score" 
               value="{{ grade.final_score if grade.final_score is not none else '' }}" min="0" max="100" step="0.1">
            </div>
            
                       <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="score" class="form-label">总分</label>
                    <input type="number" class="form-control no-spinner" id="score" name="score" value="{{ grade.score if grade.score else '' }}" min="0" max="100" step="0.1">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">学期</label>
                    <select class="form-select" name="semester">
                        <option value="">请选择学期</option>
                        <option value="2025-2026-1" {% if grade.semester == '2025-2026-1' %}selected{% endif %}>2025-2026-1</option>
                        <option value="2025-2026-2" {% if grade.semester == '2025-2026-2' %}selected{% endif %}>2025-2026-2</option>
                        <option value="2026-2027-1" {% if grade.semester == '2026-2027-1' %}selected{% endif %}>2026-2027-1</option>
                        <option value="2026-2027-2" {% if grade.semester == '2026-2027-2' %}selected{% endif %}>2026-2027-2</option>
                    </select>
                </div>
            </div>



                <div class="col-md-6 mb-3">
                    <label for="exam_date" class="form-label">考试日期</label>
                    <input type="date" class="form-control" id="exam_date" name="exam_date" value="{{ grade.exam_date if grade.exam_date else '' }}">
                </div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存修改
                </button>
                <a href="{{ url_for('grades') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var attInput = document.getElementById('attendance_score');
    var actInput = document.getElementById('activity_score');
    var finInput = document.getElementById('final_score');
    var totalInput = document.getElementById('score');
    
    function calculateTotal() {
        var att = attInput.value.trim();
        var act = actInput.value.trim();
        var fin = finInput.value.trim();
        
        // 如果考勤、活动、期末都不为空才自动计算
        if (att !== '' && act !== '' && fin !== '') {
            var sum = parseFloat(att) + parseFloat(act) + parseFloat(fin);
            totalInput.value = isNaN(sum) ? '' : sum;
        }
    }
    
    attInput.addEventListener('input', calculateTotal);
    actInput.addEventListener('input', calculateTotal);
    finInput.addEventListener('input', calculateTotal);
});
</script>

{% endblock %}
